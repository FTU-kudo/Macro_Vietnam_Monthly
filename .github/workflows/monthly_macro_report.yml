name: 📊 VN Macro Monthly Report

# Lượt 1: Ngày 3 — PMI + NSO + VBMA thường đã có
# Lượt 2: Ngày 15 — Customs + VNBA thường đã có
on:
  schedule:
    - cron: '0 2 3 * *'
    - cron: '0 2 15 * *'
  workflow_dispatch:
    inputs:
      report_month:
        description: 'YYYY-MM (bỏ trống = tháng trước)'
        required: false
        default: ''
      force_partial:
        description: 'Chạy khi thiếu nguồn? (true/false)'
        required: false
        default: 'false'
      skip_preflight:
        description: 'Bỏ qua preflight check? (true/false) — dùng khi biết chắc data có sẵn'
        required: false
        default: 'false'
      skip_email:
        description: 'Bỏ qua gửi email? (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write

jobs:
  generate-report:
    name: 🔄 Generate VN Macro Report
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      report_month: ${{ steps.set-month.outputs.report_month }}
      report_filename: ${{ steps.set-month.outputs.report_filename }}
      preflight_status: ${{ steps.preflight.outputs.status }}
      sources_found: ${{ steps.preflight.outputs.sources_found }}
      artifact_name: ${{ steps.set-artifact.outputs.artifact_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── FIX: set-month TRƯỚC check-existing ──────────────────────
      # Phải xác định tháng trước để check-existing dùng đúng tháng,
      # kể cả khi trigger thủ công với report_month khác tháng trước.
      - name: Determine report month
        id: set-month
        run: |
          if [ -n "${{ github.event.inputs.report_month }}" ]; then
            MONTH="${{ github.event.inputs.report_month }}"
          else
            MONTH=$(date -d '1 month ago' +'%Y-%m')
          fi
          echo "report_month=$MONTH" >> $GITHUB_OUTPUT
          echo "REPORT_MONTH=$MONTH" >> $GITHUB_ENV
          # Tên file theo tháng (dạng: Tháng 6-2026)
          MONTH_NUM=$(echo $MONTH | cut -d'-' -f2 | sed 's/^0//')
          YEAR_NUM=$(echo $MONTH | cut -d'-' -f1)
          FNAME="Báo cáo Vĩ mô Việt Nam - Tháng ${MONTH_NUM}-${YEAR_NUM}"
          echo "REPORT_FILENAME=$FNAME" >> $GITHUB_ENV
          echo "report_filename=$FNAME" >> $GITHUB_OUTPUT
          echo "📅 Report month: $MONTH | Filename: $FNAME"

      # ── Bỏ qua nếu đã có báo cáo đầy đủ 5/5 nguồn ──────────────
      - name: Check if full report already exists
        id: check-existing
        run: |
          MONTH="${{ steps.set-month.outputs.report_month }}"
          REPORT="vn-macro-monthly/$MONTH/report.json"

          if [ -f "$REPORT" ]; then
            SOURCES=$(python3 -c "
          import json
          d = json.load(open('$REPORT'))
          print(d.get('_meta', {}).get('sources_available', 0))
          " 2>/dev/null || echo "0")

            if [ "$SOURCES" = "5" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "✅ Báo cáo đầy đủ ($SOURCES/5) đã có cho $MONTH — bỏ qua"
            else
              echo "skip=false" >> $GITHUB_OUTPUT
              echo "⚠️  Báo cáo cũ chỉ $SOURCES/5 nguồn — chạy lại để bổ sung"
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "📋 Chưa có báo cáo tháng $MONTH — bắt đầu tạo"
          fi

      # ── FIX: tất cả steps dưới đây đều có if:skip ───────────────
      - name: Set up Python 3.11
        if: steps.check-existing.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        if: steps.check-existing.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install system deps (poppler cho pdftotext)
        if: steps.check-existing.outputs.skip != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        if: steps.check-existing.outputs.skip != 'true'
        run: pip install -r requirements.txt --quiet

      - name: Pre-flight check (verify sources)
        if: steps.check-existing.outputs.skip != 'true'
        id: preflight
        env:
          REPORT_MONTH: ${{ env.REPORT_MONTH }}
          FORCE_PARTIAL: ${{ github.event.inputs.force_partial || 'false' }}
          SKIP_PREFLIGHT: ${{ github.event.inputs.skip_preflight || 'false' }}
        run: |
          # Nếu skip_preflight=true → bỏ qua check, tiến hành luôn
          if [ "$SKIP_PREFLIGHT" = "true" ]; then
            echo "⏭️  skip_preflight=true — bỏ qua pre-flight check"
            echo "status=PARTIAL" >> $GITHUB_OUTPUT
            echo "sources_found=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          python scripts/preflight_check.py \
            --month "$REPORT_MONTH" \
            --force-partial "$FORCE_PARTIAL" \
            --output preflight_result.json

          STATUS=$(python -c "import json; d=json.load(open('preflight_result.json')); print(d['status'])")
          FOUND=$(python -c "import json; d=json.load(open('preflight_result.json')); print(d['sources_found'])")

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "sources_found=$FOUND" >> $GITHUB_OUTPUT
          echo "🔍 Preflight: $STATUS ($FOUND/5 nguồn)"

          if [ "$STATUS" = "FAIL" ]; then
            echo "❌ Preflight FAIL — dùng force_partial=true hoặc skip_preflight=true để override"
            exit 1
          fi

      - name: Fetch and cache sources
        if: steps.check-existing.outputs.skip != 'true'
        env:
          REPORT_MONTH: ${{ env.REPORT_MONTH }}
          FORCE_PARTIAL: ${{ github.event.inputs.force_partial || 'false' }}
        run: |
          python scripts/fetch_sources.py \
            --month "$REPORT_MONTH" \
            --cache-dir "vn-macro-monthly/$REPORT_MONTH/sources_cache" \
            --force-partial "$FORCE_PARTIAL"
          echo "✅ Sources cached"

      # ── FIX: đổi từ ANTHROPIC_API_KEY → GEMINI_API_KEY ──────────
      - name: Extract 41 indicators via Gemini API
        if: steps.check-existing.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPORT_MONTH: ${{ env.REPORT_MONTH }}
        run: |
          python scripts/extract_data.py \
            --month "$REPORT_MONTH" \
            --cache-dir "vn-macro-monthly/$REPORT_MONTH/sources_cache" \
            --output "vn-macro-monthly/$REPORT_MONTH/report.json"
          echo "✅ report.json generated"

      - name: Update history.json
        if: steps.check-existing.outputs.skip != 'true'
        env:
          REPORT_MONTH: ${{ env.REPORT_MONTH }}
        run: |
          python scripts/update_history.py \
            --month "$REPORT_MONTH" \
            --report "vn-macro-monthly/$REPORT_MONTH/report.json" \
            --history "vn-macro-monthly/history.json"
          echo "✅ history.json updated"

      - name: Render HTML report
        if: steps.check-existing.outputs.skip != 'true'
        env:
          REPORT_MONTH: ${{ env.REPORT_MONTH }}
          REPORT_FILENAME: ${{ env.REPORT_FILENAME }}
        run: |
          python scripts/render_report.py \
            --month "$REPORT_MONTH" \
            --report "vn-macro-monthly/$REPORT_MONTH/report.json" \
            --history "vn-macro-monthly/history.json" \
            --template "assets/report_template.html" \
            --output "vn-macro-monthly/$REPORT_MONTH/${REPORT_FILENAME}.html"
          echo "✅ report HTML rendered: ${REPORT_FILENAME}.html"

      - name: Install Playwright Chromium (for PDF export)
        if: steps.check-existing.outputs.skip != 'true'
        run: |
          pip install playwright --quiet
          playwright install chromium --with-deps
          echo "✅ Playwright + Chromium ready"

      - name: Export PDF from HTML report
        if: steps.check-existing.outputs.skip != 'true'
        env:
          REPORT_MONTH: ${{ env.REPORT_MONTH }}
          REPORT_FILENAME: ${{ env.REPORT_FILENAME }}
        run: |
          python scripts/html_to_pdf.py \
            --html "vn-macro-monthly/$REPORT_MONTH/${REPORT_FILENAME}.html" \
            --output "vn-macro-monthly/$REPORT_MONTH/${REPORT_FILENAME}.pdf"
          echo "✅ PDF exported: ${REPORT_FILENAME}.pdf"

      - name: Commit report to repository
        if: steps.check-existing.outputs.skip != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "VN Macro Bot"
          git add vn-macro-monthly/
          if git diff --staged --quiet; then
            echo "⚠️ No changes to commit"
          else
            git commit -m "📊 Auto: VN Macro Report ${{ env.REPORT_MONTH }} (${{ steps.preflight.outputs.sources_found }}/5 nguồn)"
            git push
            echo "✅ Committed and pushed"
          fi

      - name: Set artifact name output
        if: steps.check-existing.outputs.skip != 'true'
        id: set-artifact
        run: echo "artifact_name=vn-macro-report-${{ env.REPORT_MONTH }}" >> $GITHUB_OUTPUT

      - name: Upload report as artifact
        if: steps.check-existing.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vn-macro-report-${{ env.REPORT_MONTH }}
          path: vn-macro-monthly/${{ env.REPORT_MONTH }}/
          retention-days: 90

  notify:
    name: 📧 Send Email Notification
    runs-on: ubuntu-latest
    needs: generate-report
    if: always() && github.event.inputs.skip_email != 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt --quiet

      # Download artifact để lấy report.pdf đính kèm email
      - name: Download report artifact
        if: needs.generate-report.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.generate-report.outputs.artifact_name }}
          path: vn-macro-monthly/${{ needs.generate-report.outputs.report_month }}/
        continue-on-error: true   # không fail notify nếu artifact không tồn tại

      - name: Send SUCCESS email
        if: needs.generate-report.result == 'success'
        env:
          EMAIL_USER: ${{ secrets.GMAIL_USER }}
          EMAIL_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.RECIPIENT_EMAILS }}
          REPORT_MONTH: ${{ needs.generate-report.outputs.report_month }}
          SOURCES_FOUND: ${{ needs.generate-report.outputs.sources_found }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          FNAME="${{ needs.generate-report.outputs.report_filename }}"
          python scripts/notify_email.py \
            --status success \
            --month "$REPORT_MONTH" \
            --sources "$SOURCES_FOUND" \
            --repo-url "$REPO_URL" \
            --pdf-path "vn-macro-monthly/$REPORT_MONTH/${FNAME}.pdf" \
            --html-path "vn-macro-monthly/$REPORT_MONTH/${FNAME}.html"

      - name: Send FAILURE email
        if: needs.generate-report.result == 'failure'
        env:
          EMAIL_USER: ${{ secrets.GMAIL_USER }}
          EMAIL_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.RECIPIENT_EMAILS }}
          REPORT_MONTH: ${{ needs.generate-report.outputs.report_month }}
          SOURCES_FOUND: ${{ needs.generate-report.outputs.sources_found }}
        run: |
          python scripts/notify_email.py \
            --status preflight_fail \
            --month "$REPORT_MONTH" \
            --sources "${SOURCES_FOUND:-0}"
