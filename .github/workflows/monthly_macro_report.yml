name: 📊 VN Macro Monthly Report

# ============================================================
# LỊCH CHẠY: Ngày 20 mỗi tháng lúc 9:00 UTC (16:00 ICT)
# Chọn ngày 20 vì đến lúc đó hầu hết 5 nguồn đã publish:
#   - S&P PMI:   ngày 1-3 (tháng M+1)
#   - NSO:       ngày 27-30 (tháng M)
#   - VBMA:      tuần cuối tháng M
#   - VNBA:      tuần 2-3 tháng M+1
#   - Customs:   khoảng 15 tháng M+1
# ============================================================
on:
  schedule:
    # Lượt 1: Ngày 3 lúc 9:00 ICT — PMI + NSO + VBMA thường đã có
    - cron: '0 2 3 * *'
    # Lượt 2: Ngày 15 lúc 9:00 ICT — Customs + VNBA thường đã có
    - cron: '0 2 15 * *'
  workflow_dispatch:
    inputs:
      report_month:
        description: 'YYYY-MM (bỏ trống = tháng trước)'
        required: false
      force_partial:
        description: 'Chạy khi thiếu nguồn? (true/false)'
        required: false
        default: 'false'
      skip_email:
        required: false
        default: 'false'

permissions:
  contents: write   # để commit report vào repo
  pages: write      # nếu dùng GitHub Pages

jobs:
  # ============================================================
  # JOB 1: FETCH + EXTRACT + RENDER
  # ============================================================
  generate-report:
    name: 🔄 Generate VN Macro Report
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      report_month: ${{ steps.set-month.outputs.report_month }}
      preflight_status: ${{ steps.preflight.outputs.status }}
      sources_found: ${{ steps.preflight.outputs.sources_found }}

    steps:
      - uses: actions/checkout@v4

      - name: Check if full report already exists
        id: check-existing
        run: |
          MONTH=$(date -d '1 month ago' +'%Y-%m')
          REPORT="vn-macro-monthly/$MONTH/report.json"
          
          if [ -f "$REPORT" ]; then
            SOURCES=$(python3 -c "
          import json
          d = json.load(open('$REPORT'))
          print(d.get('_meta', {}).get('sources_available', 0))
          " 2>/dev/null || echo "0")
            
            if [ "$SOURCES" = "5" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "✅ Báo cáo đầy đủ ($SOURCES/5) đã có cho $MONTH — bỏ qua"
            else
              echo "skip=false" >> $GITHUB_OUTPUT
              echo "⚠️ Báo cáo cũ chỉ $SOURCES/5 nguồn — chạy lại để bổ sung"
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "📋 Chưa có báo cáo tháng $MONTH — bắt đầu tạo"
          fi

      # Tất cả steps sau đây chỉ chạy khi skip=false
      - name: Set up Python
        if: steps.check-existing.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install system deps (poppler cho pdftotext)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: pip install -r requirements.txt --quiet

      # ------ 1. XÁC ĐỊNH THÁNG BÁO CÁO ------
      - name: Determine report month
        id: set-month
        run: |
          if [ -n "${{ github.event.inputs.report_month }}" ]; then
            MONTH="${{ github.event.inputs.report_month }}"
          else
            # Mặc định: tháng trước
            MONTH=$(date -d '1 month ago' +'%Y-%m')
          fi
          echo "report_month=$MONTH" >> $GITHUB_OUTPUT
          echo "REPORT_MONTH=$MONTH" >> $GITHUB_ENV
          echo "📅 Report month: $MONTH"

      # ------ 2. PRE-FLIGHT CHECK ------
      - name: Pre-flight check (verify 5 sources)
        id: preflight
        env:
          REPORT_MONTH: ${{ env.REPORT_MONTH }}
          FORCE_PARTIAL: ${{ github.event.inputs.force_partial || 'false' }}
        run: |
          python scripts/preflight_check.py \
            --month "$REPORT_MONTH" \
            --force-partial "$FORCE_PARTIAL" \
            --output preflight_result.json

          # Đọc kết quả preflight
          STATUS=$(python -c "import json; d=json.load(open('preflight_result.json')); print(d['status'])")
          FOUND=$(python -c "import json; d=json.load(open('preflight_result.json')); print(d['sources_found'])")

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "sources_found=$FOUND" >> $GITHUB_OUTPUT
          echo "🔍 Preflight: $STATUS ($FOUND/5 nguồn)"

          # Dừng nếu FAIL và không override
          if [ "$STATUS" = "FAIL" ]; then
            echo "❌ Preflight FAIL - không đủ nguồn"
            exit 1
          fi

      # ------ 3. FETCH & CACHE 5 NGUỒN ------
      - name: Fetch and cache sources
        env:
          REPORT_MONTH: ${{ env.REPORT_MONTH }}
        run: |
          python scripts/fetch_sources.py \
            --month "$REPORT_MONTH" \
            --cache-dir "vn-macro-monthly/$REPORT_MONTH/sources_cache"
          echo "✅ Sources cached"

      # ------ 4. EXTRACT DATA (Claude API) ------
      - name: Extract 41 indicators via Claude API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPORT_MONTH: ${{ env.REPORT_MONTH }}
        run: |
          python scripts/extract_data.py \
            --month "$REPORT_MONTH" \
            --cache-dir "vn-macro-monthly/$REPORT_MONTH/sources_cache" \
            --output "vn-macro-monthly/$REPORT_MONTH/report.json"
          echo "✅ report.json generated"

      # ------ 5. UPDATE HISTORY ------
      - name: Update history.json
        env:
          REPORT_MONTH: ${{ env.REPORT_MONTH }}
        run: |
          python scripts/update_history.py \
            --month "$REPORT_MONTH" \
            --report "vn-macro-monthly/$REPORT_MONTH/report.json" \
            --history "vn-macro-monthly/history.json"
          echo "✅ history.json updated"

      # ------ 6. RENDER HTML DASHBOARD ------
      - name: Render HTML report
        env:
          REPORT_MONTH: ${{ env.REPORT_MONTH }}
        run: |
          python scripts/render_report.py \
            --month "$REPORT_MONTH" \
            --report "vn-macro-monthly/$REPORT_MONTH/report.json" \
            --history "vn-macro-monthly/history.json" \
            --template "assets/report_template.html" \
            --output "vn-macro-monthly/$REPORT_MONTH/report.html"
          echo "✅ report.html rendered"

      # ------ 7. COMMIT VÀO REPO ------
      - name: Commit report to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "VN Macro Bot"

          git add vn-macro-monthly/

          if git diff --staged --quiet; then
            echo "⚠️ No changes to commit"
          else
            git commit -m "📊 Auto: VN Macro Report ${{ env.REPORT_MONTH }} (${{ steps.preflight.outputs.sources_found }}/5 nguồn)"
            git push
            echo "✅ Committed and pushed"
          fi

      # ------ 8. UPLOAD ARTIFACT ------
      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vn-macro-report-${{ env.REPORT_MONTH }}
          path: vn-macro-monthly/${{ env.REPORT_MONTH }}/report.html
          retention-days: 90

  # ============================================================
  # JOB 2: GỬI EMAIL THÔNG BÁO
  # ============================================================
  notify:
    name: 📧 Send Email Notification
    runs-on: ubuntu-latest
    needs: generate-report
    if: always() && github.event.inputs.skip_email != 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Send SUCCESS email
        if: needs.generate-report.result == 'success'
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          REPORT_MONTH: ${{ needs.generate-report.outputs.report_month }}
          SOURCES_FOUND: ${{ needs.generate-report.outputs.sources_found }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          python scripts/notify_email.py \
            --status success \
            --month "$REPORT_MONTH" \
            --sources "$SOURCES_FOUND" \
            --repo-url "$REPO_URL"

      - name: Send FAILURE email (preflight fail)
        if: needs.generate-report.result == 'failure'
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          REPORT_MONTH: ${{ needs.generate-report.outputs.report_month }}
          SOURCES_FOUND: ${{ needs.generate-report.outputs.sources_found }}
        run: |
          python scripts/notify_email.py \
            --status preflight_fail \
            --month "$REPORT_MONTH" \
            --sources "${SOURCES_FOUND:-0}"
